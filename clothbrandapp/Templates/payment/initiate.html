{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Checkout | VERT-15</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }

    .payment-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 45px 35px;
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h2 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .header p {
      color: #94a3b8;
      font-size: 15px;
    }

    .input-group {
      margin-bottom: 22px;
    }

    .input-group label {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
    }

    .pay-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(90deg, #22c55e, #4ade80);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .pay-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(34, 197, 94, 0.4);
    }

    .secure {
      text-align: center;
      margin-top: 25px;
      font-size: 13px;
      color: #64748b;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #94a3b8;
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .back-link:hover {
      color: #e0f2fe;
    }
  </style>
</head>
<body>

  <div class="payment-card">
    <a href="/" class="back-link">
      <i class="fas fa-arrow-left"></i> Continue Shopping
    </a>

    <div class="header">
      <h2>💳 Secure Checkout</h2>
      <p>Powered by Paystack</p>
    </div>

    <form id="paymentForm">
      {% csrf_token %}

      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" 
               value="{{ request.user.email|default:'' }}" 
               placeholder="your@email.com" required>
      </div>

      <div class="input-group">
        <label for="amount">Amount (₦)</label>
        <input type="number" id="amount" name="amount" 
               placeholder="Enter amount" min="100" required>
      </div>

      <button type="button" onclick="payWithPaystack()" class="pay-btn">
        <i class="fas fa-lock"></i> Pay Securely Now
      </button>
    </form>

    <div class="secure">
      <i class="fas fa-shield-alt"></i>
      Secured by Paystack • SSL Encrypted
    </div>
  </div>

  <!-- Paystack Script -->
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <script src="https://js.paystack.co/v1/inline.js"></script>
<script>
    function payWithPaystack() {
        const email = document.getElementById('email').value.trim();
        const amountNaira = document.getElementById('amount').value.trim();

        if (!email || !amountNaira) {
            alert("Please enter both email and amount");
            return;
        }

        const amountInKobo = parseInt(amountNaira) * 100;

        var handler = PaystackPop.setup({
            key: '{{ PAYSTACK_PUBLIC_KEY }}',
            email: email,
            amount: amountInKobo,
            currency: "NGN",
            ref: "vert-" + Math.floor(Math.random() * 1000000000),
            
            callback: function(response) {
                // IMPORTANT: Changed to match your urls.py
                window.location.href = `/callback/?reference=${response.reference}`;
            },
            
            onClose: function() {
                alert('Payment window closed. Transaction was not completed.');
            }
        });

        handler.openIframe();
    }
</script>

</body>
</html>
