{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Failed</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1e2937, #334155);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(15px);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      max-width: 400px;
    }
    .icon { font-size: 70px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">❌</div>
    <h2>Payment Failed</h2>
    <p>{{ error|default:'Something went wrong with your payment.' }}</p>
    <br>
    <a href="/initiate/" style="color:#22c55e; text-decoration:underline;">Try Again</a>
  </div>
</body>
</html>
